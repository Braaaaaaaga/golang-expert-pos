version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: rate-limiter-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - rate-limiter-net

  rate-limiter:
    build: .
    container_name: rate-limiter-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - RATE_LIMIT_PER_IP=10
      - RATE_LIMIT_BLOCK_TIME_IP=300
      - API_TOKENS=abc123:100:600,def456:50:300,xyz789:200:900
      - SERVER_PORT=8080
    depends_on:
      - redis
    networks:
      - rate-limiter-net

volumes:
  redis_data:
    driver: local

networks:
  rate-limiter-net:
    driver: bridge